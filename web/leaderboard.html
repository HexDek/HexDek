<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HexDek — Leaderboard</title>
  <link rel="stylesheet" href="styles.css?v=20260430">
  <style>
    .lb-container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .lb-table th { text-align: left; padding: 0.5rem; border-bottom: 2px solid #333; color: #888; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    .lb-table td { padding: 0.5rem; border-bottom: 1px solid #222; }
    .lb-table tr:hover td { background: #1a1a2e; }
    .rank { color: #666; font-weight: 700; width: 2rem; }
    .commander { font-weight: 600; }
    .owner { color: #888; font-size: 0.8rem; }
    .rating { font-weight: 700; font-family: monospace; }
    .mu-sigma { color: #666; font-size: 0.8rem; font-family: monospace; }
    .games { color: #888; text-align: right; }
    .badge-gold { color: #ffd700; }
    .badge-silver { color: #c0c0c0; }
    .badge-bronze { color: #cd7f32; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .empty-state { color: #666; text-align: center; padding: 3rem 0; }
    a.deck-link { color: inherit; text-decoration: none; }
    a.deck-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/ui/" style="color:inherit;text-decoration:none">HexDek</a></div>
    <nav style="display:flex;gap:1rem;font-size:0.85rem">
      <a href="/ui/" style="color:#888">Game</a>
      <a href="/ui/leaderboard.html" style="color:#fff;font-weight:600">Leaderboard</a>
      <a href="/ui/import.html" style="color:#888">Import</a>
    </nav>
  </header>

  <div class="lb-container">
    <div class="page-title">Leaderboard</div>
    <div class="subtitle">Deck ratings by conservative TrueSkill estimate (μ − 3σ)</div>

    <table class="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Commander</th>
          <th>Owner</th>
          <th>Rating</th>
          <th>μ / σ</th>
          <th style="text-align:right">Games</th>
          <th>Version</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="7" class="empty-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
  (function() {
    fetch('/api/leaderboard')
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('lb-body');
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No rated decks yet. Run some games first.</td></tr>';
          return;
        }
        tbody.innerHTML = data.map((d, i) => {
          const rank = i + 1;
          let badge = '';
          if (rank === 1) badge = '<span class="badge-gold">★</span> ';
          else if (rank === 2) badge = '<span class="badge-silver">★</span> ';
          else if (rank === 3) badge = '<span class="badge-bronze">★</span> ';
          return `<tr>
            <td class="rank">${badge}${rank}</td>
            <td class="commander"><a class="deck-link" href="/ui/drilldown.html?owner=${encodeURIComponent(d.owner)}&id=${encodeURIComponent(d.deck_id)}">${esc(d.commander)}</a></td>
            <td class="owner">${esc(d.owner)}</td>
            <td class="rating">${d.rating.toFixed(1)}</td>
            <td class="mu-sigma">${d.mu.toFixed(1)} / ${d.sigma.toFixed(2)}</td>
            <td class="games">${d.games_played}</td>
            <td>v${d.version}</td>
          </tr>`;
        }).join('');
      })
      .catch(err => {
        document.getElementById('lb-body').innerHTML =
          `<tr><td colspan="7" class="empty-state">Error loading leaderboard: ${err.message}</td></tr>`;
      });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
