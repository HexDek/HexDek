<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HexDek — Import Deck</title>
  <link rel="stylesheet" href="styles.css?v=20260430">
  <style>
    .import-container { max-width: 600px; margin: 3rem auto; padding: 0 1rem; }
    .import-card { background: #1a1a2e; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .import-card h2 { font-size: 1.1rem; margin: 0 0 1rem; }
    .import-card input, .import-card textarea { width: 100%; box-sizing: border-box; margin-bottom: 0.75rem; padding: 0.6rem; background: #111; border: 1px solid #333; border-radius: 4px; color: #ddd; font-family: inherit; font-size: 0.9rem; }
    .import-card textarea { min-height: 120px; font-family: monospace; font-size: 0.8rem; resize: vertical; }
    .import-btn { padding: 0.6rem 1.5rem; background: #4488ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .import-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .import-btn:hover:not(:disabled) { background: #3377ee; }
    .result { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; font-size: 0.85rem; }
    .result.success { background: #0a2a0a; border: 1px solid #2a4a2a; color: #66ff66; }
    .result.error { background: #2a0a0a; border: 1px solid #4a2a2a; color: #ff6666; }
    .divider { text-align: center; color: #555; margin: 1rem 0; font-size: 0.85rem; }
    .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/ui/" style="color:inherit;text-decoration:none">HexDek</a></div>
    <nav style="display:flex;gap:1rem;font-size:0.85rem">
      <a href="/ui/" style="color:#888">Game</a>
      <a href="/ui/leaderboard.html" style="color:#888">Leaderboard</a>
      <a href="/ui/import.html" style="color:#fff;font-weight:600">Import</a>
    </nav>
  </header>

  <div class="import-container">
    <div class="page-title">Import Deck</div>

    <div class="import-card">
      <h2>Import from Moxfield URL</h2>
      <input id="mox-url" type="url" placeholder="https://www.moxfield.com/decks/...">
      <input id="mox-owner" type="text" placeholder="Owner (e.g. josh, 7174n1c)" value="">
      <button class="import-btn" id="btn-mox-import">Import from Moxfield</button>
      <div id="mox-result"></div>
    </div>

    <div class="divider">— or —</div>

    <div class="import-card">
      <h2>Paste Decklist</h2>
      <input id="paste-name" type="text" placeholder="Deck name">
      <input id="paste-owner" type="text" placeholder="Owner" value="">
      <textarea id="paste-list" placeholder="COMMANDER: Yuriko, the Tiger's Shadow
1 Sol Ring
1 Mana Crypt
..."></textarea>
      <button class="import-btn" id="btn-paste-import">Import Decklist</button>
      <div id="paste-result"></div>
    </div>
  </div>

  <script>
  (function() {
    document.getElementById('btn-mox-import').addEventListener('click', async () => {
      const url = document.getElementById('mox-url').value.trim();
      const owner = document.getElementById('mox-owner').value.trim() || 'imported';
      const resultEl = document.getElementById('mox-result');
      const btn = document.getElementById('btn-mox-import');

      if (!url) { resultEl.innerHTML = '<div class="result error">Enter a Moxfield URL</div>'; return; }

      btn.disabled = true;
      btn.textContent = 'Importing...';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/api/import/moxfield', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, owner }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Import failed');

        resultEl.innerHTML = `<div class="result success">
          Imported <strong>${esc(data.commander || data.name)}</strong> (${data.card_count} cards)
          as <code>${esc(data.owner)}/${esc(data.id)}</code>
          <br><a href="/ui/drilldown.html?owner=${encodeURIComponent(data.owner)}&id=${encodeURIComponent(data.id)}" style="color:#4488ff">View deck →</a>
        </div>`;
      } catch (err) {
        resultEl.innerHTML = `<div class="result error">${esc(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Import from Moxfield';
      }
    });

    document.getElementById('btn-paste-import').addEventListener('click', async () => {
      const name = document.getElementById('paste-name').value.trim();
      const owner = document.getElementById('paste-owner').value.trim() || 'imported';
      const deckList = document.getElementById('paste-list').value;
      const resultEl = document.getElementById('paste-result');
      const btn = document.getElementById('btn-paste-import');

      if (!deckList.trim()) { resultEl.innerHTML = '<div class="result error">Paste a decklist</div>'; return; }

      btn.disabled = true;
      btn.textContent = 'Importing...';
      resultEl.innerHTML = '';

      try {
        const res = await fetch('/api/decks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name || 'imported_deck', owner, deck_list: deckList }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Import failed');

        resultEl.innerHTML = `<div class="result success">
          Imported <strong>${esc(data.commander_card || data.name)}</strong> (${data.card_count} cards)
          as <code>${esc(data.owner)}/${esc(data.id)}</code>
          <br><a href="/ui/drilldown.html?owner=${encodeURIComponent(data.owner)}&id=${encodeURIComponent(data.id)}" style="color:#4488ff">View deck →</a>
        </div>`;
      } catch (err) {
        resultEl.innerHTML = `<div class="result error">${esc(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Import Decklist';
      }
    });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
