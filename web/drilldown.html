<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HexDek — Deck Drilldown</title>
  <link rel="stylesheet" href="styles.css?v=20260430">
  <style>
    .dd-container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .dd-header { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 2rem; }
    .dd-art { width: 200px; height: 150px; object-fit: cover; border-radius: 8px; background: #1a1a2e; }
    .dd-info h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
    .dd-info .meta { color: #888; font-size: 0.85rem; }
    .dd-tabs { display: flex; gap: 0; border-bottom: 2px solid #333; margin-bottom: 1.5rem; }
    .dd-tab { padding: 0.6rem 1.2rem; cursor: pointer; color: #888; font-weight: 600; font-size: 0.85rem; border: none; background: none; }
    .dd-tab.active { color: #fff; border-bottom: 2px solid #4488ff; margin-bottom: -2px; }
    .dd-panel { display: none; }
    .dd-panel.active { display: block; }
    .section { margin-bottom: 2rem; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; color: #ccc; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .stat-card { background: #1a1a2e; border-radius: 6px; padding: 0.75rem 1rem; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; font-family: monospace; }
    .mini-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .mini-table th { text-align: left; padding: 0.4rem; border-bottom: 1px solid #333; color: #888; font-weight: 600; }
    .mini-table td { padding: 0.4rem; border-bottom: 1px solid #1a1a2e; }
    .empty { color: #666; font-style: italic; }
    .version-node { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid #222; }
    .version-dot { width: 10px; height: 10px; border-radius: 50%; background: #4488ff; flex-shrink: 0; }
    .version-dot.old { background: #444; }
    .version-meta { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/ui/" style="color:inherit;text-decoration:none">HexDek</a></div>
    <nav style="display:flex;gap:1rem;font-size:0.85rem">
      <a href="/ui/" style="color:#888">Game</a>
      <a href="/ui/leaderboard.html" style="color:#888">Leaderboard</a>
      <a href="/ui/import.html" style="color:#888">Import</a>
    </nav>
  </header>

  <div class="dd-container">
    <div class="dd-header">
      <img id="dd-art" class="dd-art" src="" alt="">
      <div class="dd-info">
        <h1 id="dd-commander">Loading...</h1>
        <div class="meta" id="dd-meta"></div>
      </div>
    </div>

    <div class="dd-tabs">
      <button class="dd-tab active" data-tab="overview">Overview</button>
      <button class="dd-tab" data-tab="analysis">Freya Analysis</button>
      <button class="dd-tab" data-tab="matchups">Matchups</button>
      <button class="dd-tab" data-tab="threats">Threat Graph</button>
      <button class="dd-tab" data-tab="cards">Card Stats</button>
      <button class="dd-tab" data-tab="versions">Versions</button>
    </div>

    <div id="panel-overview" class="dd-panel active"></div>
    <div id="panel-analysis" class="dd-panel"></div>
    <div id="panel-matchups" class="dd-panel"></div>
    <div id="panel-threats" class="dd-panel"></div>
    <div id="panel-cards" class="dd-panel"></div>
    <div id="panel-versions" class="dd-panel"></div>
  </div>

  <script>
  (function() {
    const params = new URLSearchParams(location.search);
    const owner = params.get('owner');
    const id = params.get('id');
    if (!owner || !id) {
      document.querySelector('.dd-container').innerHTML = '<p class="empty">Missing owner or id in URL parameters.</p>';
      return;
    }

    // Tab switching.
    document.querySelectorAll('.dd-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.dd-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Load deck info.
    fetch(`/api/decks/${owner}/${id}`)
      .then(r => r.json())
      .then(deck => {
        const cmdr = deck.commander_card || deck.commander || id;
        document.getElementById('dd-commander').textContent = cmdr;
        document.getElementById('dd-meta').textContent = `${deck.card_count} cards · Bracket ${deck.bracket} · Owner: ${owner}`;
        document.title = `HexDek — ${cmdr}`;
        const artImg = document.getElementById('dd-art');
        artImg.src = `/api/card-art/${encodeURIComponent(cmdr.split('//')[0].trim())}`;
        artImg.onerror = () => { artImg.style.display = 'none'; };
      })
      .catch(() => {});

    // Load all data in parallel.
    Promise.all([
      fetch(`/api/decks/${owner}/${id}/analysis`).then(r => r.ok ? r.json() : null).catch(() => null),
      fetch(`/api/rivalry/${owner}/${id}`).then(r => r.json()).catch(() => ({ rivals: [] })),
      fetch(`/api/threat-graph/${owner}/${id}`).then(r => r.json()).catch(() => ({ top_kills: [], top_deaths: [] })),
      fetch(`/api/card-stats/${encodeURIComponent(id.replace(/_/g, ' '))}`).then(r => r.json()).catch(() => ({ cards: [] })),
      fetch(`/api/decks/${owner}/${id}/lineage`).then(r => r.json()).catch(() => []),
    ]).then(([analysis, rivalry, threats, cardStats, lineage]) => {
      renderOverview(analysis, rivalry, threats);
      renderAnalysis(analysis);
      renderMatchups(rivalry);
      renderThreats(threats);
      renderCards(cardStats);
      renderVersions(lineage);
    });

    function renderOverview(analysis, rivalry, threats) {
      const el = document.getElementById('panel-overview');
      let html = '<div class="stat-grid">';
      if (analysis) {
        html += stat('Archetype', analysis.archetype || '—');
        html += stat('Bracket', analysis.bracket || '—');
        html += stat('Win Lines', (analysis.win_lines || []).length);
        html += stat('Mana Base', analysis.mana_base_grade || '—');
        html += stat('Power %ile', analysis.power_percentile || '—');
        html += stat('Keepable Hands', analysis.keepable_hand_pct ? (analysis.keepable_hand_pct * 100).toFixed(0) + '%' : '—');
      } else {
        html += stat('Analysis', 'Not yet analyzed');
      }
      if (threats) {
        html += stat('Total Kills', threats.total_kills || 0);
        html += stat('Total Deaths', threats.total_deaths || 0);
      }
      if (rivalry && rivalry.rivals && rivalry.rivals.length > 0) {
        html += stat('Top Rival', rivalry.rivals[0].opponent);
        html += stat('Rival Record', `${rivalry.rivals[0].wins}W/${rivalry.rivals[0].losses}L`);
      }
      html += '</div>';
      if (analysis && analysis.gameplan_summary) {
        html += `<div class="section"><div class="section-title">Gameplan</div><p style="color:#aaa;font-size:0.9rem">${esc(analysis.gameplan_summary)}</p></div>`;
      }
      el.innerHTML = html;
    }

    function renderAnalysis(analysis) {
      const el = document.getElementById('panel-analysis');
      if (!analysis) { el.innerHTML = '<p class="empty">No Freya analysis yet. Click "Analyze" on the deck page to generate one.</p>'; return; }
      let html = '';
      if (analysis.star_cards && analysis.star_cards.length > 0) {
        html += `<div class="section"><div class="section-title">Star Cards</div><p style="color:#ffd700">${analysis.star_cards.map(esc).join(', ')}</p></div>`;
      }
      if (analysis.eval_weights) {
        html += '<div class="section"><div class="section-title">Eval Weights</div><div class="stat-grid">';
        for (const [k, v] of Object.entries(analysis.eval_weights)) {
          html += stat(k.replace(/_/g, ' '), v.toFixed(2));
        }
        html += '</div></div>';
      }
      if (analysis.win_lines && analysis.win_lines.length > 0) {
        html += '<div class="section"><div class="section-title">Win Lines</div><table class="mini-table"><thead><tr><th>Type</th><th>Pieces</th></tr></thead><tbody>';
        for (const wl of analysis.win_lines) {
          html += `<tr><td>${esc(wl.type)}</td><td>${(wl.pieces || []).map(esc).join(', ')}</td></tr>`;
        }
        html += '</tbody></table></div>';
      }
      if (analysis.vulnerable_to && analysis.vulnerable_to.length > 0) {
        html += `<div class="section"><div class="section-title">Vulnerable To</div><p style="color:#ff6666">${analysis.vulnerable_to.map(esc).join(', ')}</p></div>`;
      }
      el.innerHTML = html || '<p class="empty">Analysis data is minimal.</p>';
    }

    function renderMatchups(rivalry) {
      const el = document.getElementById('panel-matchups');
      if (!rivalry.rivals || rivalry.rivals.length === 0) {
        el.innerHTML = '<p class="empty">No matchup data yet. Play some games to build rivalry history.</p>';
        return;
      }
      let html = '<table class="mini-table"><thead><tr><th>Opponent</th><th>Record</th><th>Win Rate</th><th>Games</th></tr></thead><tbody>';
      for (const r of rivalry.rivals) {
        const wr = (r.win_rate * 100).toFixed(1);
        const color = r.win_rate > 0.55 ? '#66ff66' : r.win_rate < 0.45 ? '#ff6666' : '#ffaa44';
        html += `<tr><td>${esc(r.opponent)}</td><td>${r.wins}W / ${r.losses}L</td><td style="color:${color}">${wr}%</td><td>${r.total_games}</td></tr>`;
      }
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderThreats(threats) {
      const el = document.getElementById('panel-threats');
      let html = '';
      if (threats.top_kills && threats.top_kills.length > 0) {
        html += '<div class="section"><div class="section-title">Most Killed</div><table class="mini-table"><thead><tr><th>Victim</th><th>Kills</th><th>Methods</th></tr></thead><tbody>';
        for (const e of threats.top_kills) {
          const methods = e.method_breakdown ? Object.entries(e.method_breakdown).map(([k,v]) => `${k}: ${v}`).join(', ') : '';
          html += `<tr><td>${esc(e.victim_commander)}</td><td>${e.kills}</td><td style="color:#888;font-size:0.8rem">${methods}</td></tr>`;
        }
        html += '</tbody></table></div>';
      }
      if (threats.top_deaths && threats.top_deaths.length > 0) {
        html += '<div class="section"><div class="section-title">Most Killed By</div><table class="mini-table"><thead><tr><th>Killer</th><th>Deaths</th><th>Lethal Cards</th></tr></thead><tbody>';
        for (const e of threats.top_deaths) {
          const cards = (e.top_lethal_cards || []).join(', ');
          html += `<tr><td>${esc(e.killer_commander)}</td><td>${e.kills}</td><td style="color:#888;font-size:0.8rem">${esc(cards)}</td></tr>`;
        }
        html += '</tbody></table></div>';
      }
      el.innerHTML = html || '<p class="empty">No threat data yet. Play games with audit enabled to track eliminations.</p>';
    }

    function renderCards(cardStats) {
      const el = document.getElementById('panel-cards');
      if (!cardStats.cards || cardStats.cards.length === 0) {
        el.innerHTML = '<p class="empty">No card performance data yet.</p>';
        return;
      }
      let html = '<table class="mini-table"><thead><tr><th>Card</th><th>Games</th><th>Wins</th><th>Win Rate</th><th>Board@Win</th></tr></thead><tbody>';
      for (const c of cardStats.cards) {
        const wr = c.Games > 0 ? ((c.Wins / c.Games) * 100).toFixed(1) : '0.0';
        html += `<tr><td>${esc(c.CardName)}</td><td>${c.Games}</td><td>${c.Wins}</td><td>${wr}%</td><td>${c.OnBoardAtWin}</td></tr>`;
      }
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    function renderVersions(lineage) {
      const el = document.getElementById('panel-versions');
      if (!lineage || lineage.length === 0) {
        el.innerHTML = '<p class="empty">No version history. Import or update the deck to start tracking versions.</p>';
        return;
      }
      let html = '';
      for (let i = 0; i < lineage.length; i++) {
        const v = lineage[i];
        const isHead = i === 0;
        html += `<div class="version-node">
          <div class="version-dot ${isHead ? '' : 'old'}"></div>
          <div>
            <strong>v${v.version}</strong> ${isHead ? '(HEAD)' : ''}
            <span style="color:#888;margin-left:0.5rem">Δ${v.card_delta} cards</span>
            <div class="version-meta">
              μ=${v.rating.mu.toFixed(1)} σ=${v.rating.sigma.toFixed(2)} · ${v.games_played} games · ${v.hash.slice(0,8)}
            </div>
            <div class="version-meta">${v.created_at ? new Date(v.created_at).toLocaleDateString() : ''}</div>
          </div>
        </div>`;
      }
      el.innerHTML = html;
    }

    function stat(label, value) {
      return `<div class="stat-card"><div class="stat-label">${esc(String(label))}</div><div class="stat-value">${esc(String(value))}</div></div>`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  })();
  </script>
</body>
</html>
